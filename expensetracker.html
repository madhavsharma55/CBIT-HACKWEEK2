<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> Student Expense Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 20px auto;
            padding: 10px;
        }
        .box {
            border: 1px solid black;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
        }
        .expense-item {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            padding: 5px;
            background-color: #f9f9f9;
            border-bottom: 1px dashed #ccc;
        }
        /* Simple Visual Chart Layout */
        .chart-row {
            margin: 8px 0;
        }
        .bar-container {
            background-color: #ddd;
            width: 100%;
            height: 15px;
        }
        .bar-fill {
            background-color: #333;
            height: 100%;
            width: 0%;
        }
    </style>
</head>
<body>

    <h2> Basic Expense Tracker</h2>

    <div class="box">
        <h3>1. Set Monthly Budget</h3>
        <input type="number" id="budget-input" placeholder="Enter Amount (e.g. 5000)">
        <button onclick="setBudget()">Save Budget</button>
        <p><strong>Current Limit:</strong> ₹<span id="view-budget">0</span></p>
    </div>

    <div class="box">
        <h3>2. Add New Expense</h3>
        <p>Title: <input type="text" id="exp-title" placeholder="e.g., Canteen"></p>
        <p>Amount: <input type="number" id="exp-amount" placeholder="e.g., 100"></p>
        <p>Category: 
            <select id="exp-category">
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Books">Books</option>
                <option value="Others">Others</option>
            </select>
        </p>
        <button onclick="addExpense()">Add Expense</button>
    </div>

    <div class="box">
        <h3>3. Monthly Summary</h3>
        <p>Total Spent: <strong>₹<span id="view-spent">0</span></strong></p>
        <p>Remaining: <strong>₹<span id="view-remaining">0</span></strong></p>
        <p id="warning-text" style="color: red; font-weight: bold;"></p>
    </div>

    <div class="box">
        <h3>4. History Records</h3>
        <div id="list-container">No entries recorded yet.</div>
    </div>

    <div class="box">
        <h3>5. Category Insights Visual</h3>
        <div id="chart-container"></div>
    </div>

<script>
    
    let budget = 0;
    let expenseList = [];

    function setBudget() {
        const value = document.getElementById('budget-input').value;
        if (value) {
            budget = parseFloat(value);
            updateAll();
        }
    }

    function addExpense() {
        const title = document.getElementById('exp-title').value;
        const amount = parseFloat(document.getElementById('exp-amount').value);
        const category = document.getElementById('exp-category').value;

        if (!title || !amount) {
            alert("Please fill in the title and amount details.");
            return;
        }

   
        expenseList.push({ id: Date.now(), title, amount, category });

        
        document.getElementById('exp-title').value = '';
        document.getElementById('exp-amount').value = '';

        updateAll();
    }

    function deleteExpense(id) {
        expenseList = expenseList.filter(item => item.id !== id);
        updateAll();
    }

    function updateAll() {
       
        let totalSpent = 0;
        let categoryTotals = { Food: 0, Transport: 0, Books: 0, Others: 0 };

        expenseList.forEach(item => {
            totalSpent += item.amount;
            categoryTotals[item.category] += item.amount;
        });

        let remaining = budget - totalSpent;

        
        document.getElementById('view-budget').innerText = budget;
        document.getElementById('view-spent').innerText = totalSpent;
        document.getElementById('view-remaining').innerText = remaining;

       
        const warning = document.getElementById('warning-text');
        if (budget > 0 && totalSpent > budget) {
            warning.innerText = "⚠️ Budget Limit Exceeded!";
        } else {
            warning.innerText = "";
        }

        
        const listDiv = document.getElementById('list-container');
        if(expenseList.length === 0) {
            listDiv.innerHTML = "No entries recorded yet.";
        } else {
            listDiv.innerHTML = '';
            expenseList.forEach(item => {
                listDiv.innerHTML += `
                    <div class="expense-item">
                        <span>${item.title} (${item.category}) - <b>₹${item.amount}</b></span>
                        <button onclick="deleteExpense(${item.id})">X</button>
                    </div>`;
            });
        }

       
        const chartDiv = document.getElementById('chart-container');
        chartDiv.innerHTML = '';
        
        for (let cat in categoryTotals) {
            let amt = categoryTotals[cat];
            let percent = totalSpent > 0 ? (amt / totalSpent) * 100 : 0;

            chartDiv.innerHTML += `
                <div class="chart-row">
                    <div>${cat}: ₹${amt} (${Math.round(percent)}%)</div>
                    <div class="bar-container">
                        <div class="bar-fill" style="width: ${percent}%"></div>
                    </div>
                </div>`;
        }
    }
</script>

</body>
</html>
