<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Blindness Simulator</title>
    <style>
    
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }
        .controls {
            margin: 20px 0;
        }
        select, input {
            padding: 10px;
            font-size: 16px;
            margin: 5px;
        }
        .image-preview-area {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }
        .img-box {
            flex: 1;
            min-width: 300px;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            border: 2px solid #ddd;
        }

       
        .protanopia { filter: url('#protanopia-filter'); }
        .deuteranopia { filter: url('#deuteranopia-filter'); }
        .tritanopia { filter: url('#tritanopia-filter'); }
        .achromatopsia { filter: url('#achromatopsia-filter'); }
    </style>
</head>
<body>

<div class="container">
    <h2>Color Blindness Simulator</h2>
    <p>Upload an image and switch between modes to compare views.</p>

    <div class="controls">
        <input type="file" id="imageLoader" accept="image/*">
        <label for="filterSelect">Choose Deficiency:</label>
        <select id="filterSelect" disabled>
            <option value="none">Normal Vision (Original)</option>
            <option value="protanopia">Protanopia (Red-Blind)</option>
            <option value="deuteranopia">Deuteranopia (Green-Blind)</option>
            <option value="tritanopia">Tritanopia (Blue-Blind)</option>
            <option value="achromatopsia">Achromatopsia (Total Color Blind)</option>
        </select>
    </div>

    <div class="image-preview-area">
        <div class="img-box">
            <h3>Original Image</h3>
            <img id="originalView" src="https://via.placeholder.com/400x300?text=Upload+an+Image" alt="Original">
        </div>
        <div class="img-box">
            <h3>Simulated View</h3>
            <img id="simulatedView" src="https://via.placeholder.com/400x300?text=Upload+an+Image" alt="Simulated">
        </div>
    </div>
</div>

<svg style="display: none;">
    <defs>
        <filter id="protanopia-filter">
            <feColorMatrix type="matrix" values="0.567, 0.433, 0,     0, 0
                                                 0.558, 0.442, 0,     0, 0
                                                 0,     0.242, 0.758, 0, 0
                                                 0,     0,     0,     1, 0"/>
        </filter>
        <filter id="deuteranopia-filter">
            <feColorMatrix type="matrix" values="0.625, 0.375, 0,   0, 0
                                                 0.70,  0.30,  0,   0, 0
                                                 0,     0.30,  0.70,0, 0
                                                 0,     0,     0,   1, 0"/>
        </filter>
        <filter id="tritanopia-filter">
            <feColorMatrix type="matrix" values="0.95, 0.05,  0,     0, 0
                                                 0,    0.433, 0.567, 0, 0
                                                 0,    0.475, 0.525, 0, 0
                                                 0,    0,     0,     1, 0"/>
        </filter>
        <filter id="achromatopsia-filter">
            <feColorMatrix type="matrix" values="0.299, 0.587, 0.114, 0, 0
                                                 0.299, 0.587, 0.114, 0, 0
                                                 0.299, 0.587, 0.114, 0, 0
                                                 0,     0,     0,     1, 0"/>
        </filter>
    </defs>
</svg>

<script>
    
    const imageLoader = document.getElementById('imageLoader');
    const originalView = document.getElementById('originalView');
    const simulatedView = document.getElementById('simulatedView');
    const filterSelect = document.getElementById('filterSelect');

    // Step A: Handle the image upload
    imageLoader.addEventListener('change', function(event) {
        const file = event.target.files[0]; 
        if (file) {
            const reader = new FileReader(); 
            
            
            reader.onload = function(e) {
                originalView.src = e.target.result;  
                simulatedView.src = e.target.result; 
                filterSelect.disabled = false;       
            }
            reader.readAsDataURL(file); 
        }
    });

   
    filterSelect.addEventListener('change', function() 
    {
        const selectedFilter = filterSelect.value;
        
        
        simulatedView.className = '';
        
      
        if (selectedFilter !== 'none') {
            simulatedView.classList.add(selectedFilter);
        }
    });
</script>

</body>
</html>
