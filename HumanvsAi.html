<!DOCTYPE html>
<html>
<head>
  <title>Human or AI Game</title>
</head>
<body>

  <h2>Human or AI Game</h2>
  <p>Score: <span id="score">0</span></p>
  <hr>

  <div id="game-content"></div>
  <br>

  <button onclick="guess('Human')">Human</button>
  <button onclick="guess('AI')">AI</button>

  <div id="result-box" style="margin-top: 15px;">
    <p id="feedback"></p>
    <p id="explanation"></p>
    <button id="next-btn" onclick="nextRound()" style="display:none;">Next</button>
  </div>

  <script>
   
    const rounds = [
      {
       
        html: "<p><b>Text Passage:</b><br>'The clock ticked backwards, swallowing the seconds until yesterday arrived completely unlived.'</p>",
        type: "Human",
        info: "This poetry uses deep, emotional human metaphors."
      },
      {
        
        html: "<p><b>Code Snippet:</b></p><pre>function isPrime(n) {\n  if (n <= 1) return false;\n  for (let i = 2; i <= Math.sqrt(n); i++) {\n    if (n % i === 0) return false;\n  }\n  return true;\n}</pre>",
        type: "AI",
        info: "This is standard, perfectly optimized code generated by an AI."
      },
      {
        
        html: "<p><b>Image/Artwork:</b></p><img src='https://picsum.photos/id/237/300/200' alt='Dog photo'>",
        type: "Human",
        info: "This is a real, unaltered photograph of a dog taken with a physical camera."
      },
      {
        
        html: "<p><b>Voice/Audio Clip (Press play):</b></p><audio controls src='https://interactive-examples.mdn.mozilla.net/media/cc0-audio/t-rex-roar.mp3'></audio>",
        type: "Human",
        info: "This is an authentic museum archive audio clip."
      },
      {
        
        html: "<p><b>Video Clip (Press play):</b></p><video controls width='320' src='https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4'></video>",
        type: "Human",
        info: "This is actual real-world nature macro footage recorded on location."
      }
    ];

    let current = 0;
    let score = 0;

    function showRound() {
      document.getElementById("feedback").innerText = "";
      document.getElementById("explanation").innerText = "";
      document.getElementById("next-btn").style.display = "none";
      document.getElementById("game-content").innerHTML = rounds[current].html;
    }

    function guess(playerChoice) {
      let correctAns = rounds[current].type;
      
      if (playerChoice === correctAns) {
        score++;
        document.getElementById("feedback").innerText = "Correct!";
      } else {
        document.getElementById("feedback").innerText = "Wrong!";
      }

      document.getElementById("score").innerText = score;
      document.getElementById("explanation").innerText = "Explanation: " + rounds[current].info;
      document.getElementById("next-btn").style.display = "inline";
    }

    function nextRound() {
      current++;
      if (current < rounds.length) {
        showRound();
      } else {
        document.body.innerHTML = "<h2>Game Over! Final Score: " + score + " / " + rounds.length + "</h2><button onclick='location.reload()'>Restart</button>";
      }
    }


    showRound();
  </script>

</body>
</html>
