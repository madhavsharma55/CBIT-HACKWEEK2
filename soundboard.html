<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Soundboard</title>
    <style>
     
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #333;
        }

        
        .controls {
            margin-bottom: 30px;
            background: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .stop-btn {
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }

        .stop-btn:hover {
            background-color: #cc0000;
        }

        
        .soundboard-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px;
            max-width: 600px;
        }

        .sound-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }

        .sound-btn:hover {
            background-color: #45a049;
            transform: scale(1.05); 
        }
    </style>
</head>
<body>

    <h1>My Soundboard</h1>

    <div class="controls">
        <button class="stop-btn" onclick="stopAll()">STOP ALL</button>
        <label for="volume">Volume: </label>
        <input type="range" id="volume" min="0" max="1" step="0.1" value="1" oninput="changeVolume(this.value)">
    </div>

    <div class="soundboard-grid">
        <button class="sound-btn" onclick="playSound('sound1.mp3')">Sound 1</button>
        <button class="sound-btn" onclick="playSound('sound2.mp3')">Sound 2</button>
        <button class="sound-btn" onclick="playSound('sound3.mp3')">Sound 3</button>
        <button class="sound-btn" onclick="playSound('sound4.mp3')">Sound 4</button>
        <button class="sound-btn" onclick="playSound('sound5.mp3')">Sound 5</button>
        <button class="sound-btn" onclick="playSound('sound6.mp3')">Sound 6</button>
        <button class="sound-btn" onclick="playSound('sound7.mp3')">Sound 7</button>
        <button class="sound-btn" onclick="playSound('sound8.mp3')">Sound 8</button>
        <button class="sound-btn" onclick="playSound('sound9.mp3')">Sound 9</button>
        <button class="sound-btn" onclick="playSound('sound10.mp3')">Sound 10</button>
        <button class="sound-btn" onclick="playSound('sound11.mp3')">Sound 11</button>
        <button class="sound-btn" onclick="playSound('sound12.mp3')">Sound 12</button>
    </div>

    <script>
        
        let currentAudio = null;
        let currentVolume = 1; 

        function playSound(audioFile) {
          
            if (currentAudio) {
                currentAudio.pause();
            }

           
            currentAudio = new Audio(audioFile);
            
           
            currentAudio.volume = currentVolume;
            
           
            currentAudio.play();
        }

        
        function stopAll() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0; 
            }
        }

       
        function changeVolume(volumeValue) {
            currentVolume = volumeValue; 
            if (currentAudio) {
                currentAudio.volume = volumeValue; 
            }
        }
    </script>

</body>
</html>
