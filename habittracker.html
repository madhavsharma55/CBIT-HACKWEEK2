<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Habit Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #333;
        }

        .input-section {
            margin-bottom: 25px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        input[type="text"] {
            padding: 8px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 200px;
        }

        button {
            padding: 8px 15px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        .habit-container {
            width: 100%;
            max-width: 650px;
        }

        .habit-card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .habit-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .habit-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        .streak-badge {
            background-color: #FF9800;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr); 
            gap: 8px;
        }

        .day-box {
            aspect-ratio: 1; 
            background-color: #e0e0e0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }

        .day-box.completed {
            background-color: #4CAF50;
            color: white;
        }
    </style>
</head>
<body>

    <h1> Habit Tracker</h1>

    <div class="input-section">
        <input type="text" id="habitInput" placeholder="Enter a new habit...">
        <button onclick="addHabit()">Add Habit</button>
    </div>

    <div class="habit-container" id="habitContainer"></div>

    <script>
       
        let habits = [];

        window.onload = function() {
            const savedHabits = localStorage.getItem('myHabits');
            if (savedHabits) {
                habits = JSON.parse(savedHabits);
                renderHabits();
            }
        };

       
        function addHabit() {
            const input = document.getElementById('habitInput');
            const habitText = input.value.trim();

            if (habitText === '') {
                alert('Please type a habit name!');
                return;
            }

            const newHabit = {
                id: Date.now(), 
                name: habitText,
                history: [], 
                streak: 0
            };

            habits.push(newHabit);
            saveAndRefresh();
            input.value = ''; 
        }

        
        function deleteHabit(index) {
            habits.splice(index, 1); 
            saveAndRefresh();        
        }

        
        function saveAndRefresh() {
            localStorage.setItem('myHabits', JSON.stringify(habits));
            renderHabits();
        }

   
        function toggleDay(habitId, dayNumber) {
           
            const habit = habits.find(h => h.id === habitId);
            
            const index = habit.history.indexOf(dayNumber);

            if (index === -1) 
            {
                habit.history.push(dayNumber);
            } else {
                habit.history.splice(index, 1);
            }

            
            habit.streak = habit.history.length;

            saveAndRefresh();
        }

       
        function renderHabits() {
            const container = document.getElementById('habitContainer');
            container.innerHTML = ''; 

            habits.forEach((habit, index) => {
               
                const card = document.createElement('div');
                card.className = 'habit-card';

            
                const header = document.createElement('div');
                header.className = 'habit-header';
                
                header.innerHTML = `
                    <div>
                        <span class="habit-title">${habit.name}</span>
                        <button onclick="deleteHabit(${index})" style="background:#ff4d4d; color:white; border:none; padding:5px 10px; margin-left:10px; cursor:pointer; border-radius:4px; font-size:12px;">Delete</button>
                    </div>
                    <span class="streak-badge">🔥 ${habit.streak} Day Streak</span>
                `;
                card.appendChild(header);

               
                const grid = document.createElement('div');
                grid.className = 'calendar-grid';

                
                for (let day = 1; day <= 30; day++) {
                    const dayBox = document.createElement('button');
                    dayBox.className = 'day-box';
                    dayBox.innerText = day;

                   
                    if (habit.history.includes(day)) {
                        dayBox.classList.add('completed');
                    }

                   
                    dayBox.onclick = function() {
                        toggleDay(habit.id, day);
                    };

                    grid.appendChild(dayBox);
                }

                card.appendChild(grid);
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
