<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure CSS Tyson Beyblade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="canvas">
        <div class="tyson">
            
            <div class="hat-back"></div>
            
            <div class="hair hair-left"></div>
            <div class="hair hair-right"></div>
            <div class="hair hair-top"></div>

            <div class="face">
                <div class="headband">
                    <div class="headband-badge"></div>
                </div>

                <div class="eye eye-left">
                    <div class="pupil"></div>
                </div>
                <div class="eye eye-right">
                    <div class="pupil"></div>
                </div>

                <div class="bandage bandage-left"></div>
                <div class="bandage bandage-right"></div>

                <div class="nose"></div>
                <div class="mouth"></div>
            </div>

        </div>
    </div>

</body>
</html>
